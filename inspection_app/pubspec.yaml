name: inspection_app
description: "선박 LNG탱크 부품 품질 검사 AI 앱"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 상태관리
  flutter_riverpod: ^2.5.1

  # 라우팅
  go_router: ^14.2.7

  # 네트워크
  dio: ^5.7.0

  # 저장소
  flutter_secure_storage: ^9.2.2
  sqflite: ^2.3.3
  path_provider: ^2.1.4
  path: ^1.9.0

  # 단말 추론
  tflite_flutter: ^0.12.0

  # 카메라·권한
  camera: ^0.12.0
  permission_handler: ^11.3.1
  image: ^4.3.0

  # 네트워크 상태
  connectivity_plus: ^6.0.5

  # 이미지 캐싱
  cached_network_image: ^3.4.1

  # 데이터 클래스
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # 모델 OTA (S3 presigned URL 다운로드 + SHA-256 검증) — Firebase ML 제거됨
  crypto: ^3.0.5
  shared_preferences: ^2.3.2

  # 유틸리티
  intl: ^0.19.0
  package_info_plus: ^8.0.2
  uuid: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # 코드 생성기
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/models/
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
